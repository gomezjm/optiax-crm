name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

jobs:
  unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  db:
    name: DB isolation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start local Supabase
        run: pnpm exec supabase start
      - name: Reset DB (migrations + seed)
        run: pnpm exec supabase db reset
      - name: Seed auth users
        run: pnpm seed:auth
      - name: Run isolation tests
        run: pnpm db:test
